<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floaty</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d0d14;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #app { position: relative; width: 100%; height: 100%; }

    /* ─── Toolbar ──────────────────────────────────────────────── */
    #toolbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 46px;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 10px;
      background: rgba(14, 14, 22, 0.93);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      z-index: 100;
      /* Make the bar itself draggable; interactive children override this */
      -webkit-app-region: drag;
      transform: translateY(0);
      opacity: 1;
      transition: transform 0.2s cubic-bezier(0.4,0,0.2,1),
                  opacity 0.2s ease;
    }

    #toolbar.hidden {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
    }

    /* Every interactive child is NOT draggable */
    #toolbar button,
    #toolbar input[type="text"],
    #toolbar input[type="range"] {
      -webkit-app-region: no-drag;
    }

    /* ─── Window-control dots ──────────────────────────────────── */
    .wc { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

    .wc-btn {
      width: 13px; height: 13px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      font-size: 7px; font-weight: bold;
      color: transparent;
      transition: filter 0.12s, color 0.12s;
      flex-shrink: 0;
    }
    .wc-btn:hover { filter: brightness(0.82); color: rgba(0,0,0,0.55); }
    #btn-close { background: #ff5f57; }
    #btn-min   { background: #febc2e; }
    #btn-max   { background: #28c840; }

    /* ─── Separator ────────────────────────────────────────────── */
    .sep {
      width: 1px; height: 18px;
      background: rgba(255,255,255,0.09);
      flex-shrink: 0;
    }

    /* ─── Nav buttons ──────────────────────────────────────────── */
    .nav-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.45);
      cursor: pointer;
      width: 28px; height: 28px;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; line-height: 1;
      transition: background 0.1s, color 0.1s;
      flex-shrink: 0;
    }
    .nav-btn:hover  { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.9); }
    .nav-btn:active { background: rgba(255,255,255,0.15); }
    .nav-btn:disabled { opacity: 0.28; cursor: default; pointer-events: none; }

    /* ─── URL bar ──────────────────────────────────────────────── */
    #url-bar {
      flex: 1; min-width: 0;
      height: 29px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: rgba(255,255,255,0.88);
      padding: 0 10px;
      font-size: 12.5px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    #url-bar:focus {
      border-color: rgba(107,159,255,0.55);
      background: rgba(255,255,255,0.11);
    }
    #url-bar::placeholder { color: rgba(255,255,255,0.22); }

    /* ─── Pin (always-on-top) ──────────────────────────────────── */
    #pin-btn {
      background: none; border: none;
      cursor: pointer;
      width: 28px; height: 28px;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      opacity: 0.4;
      transition: background 0.1s, opacity 0.1s;
      flex-shrink: 0;
    }
    #pin-btn:hover { background: rgba(255,255,255,0.1); opacity: 0.85; }
    #pin-btn.pinned { opacity: 1; filter: drop-shadow(0 0 4px #6b9fff88); }

    /* ─── Opacity ──────────────────────────────────────────────── */
    #opacity-wrap {
      display: flex; align-items: center; gap: 4px;
      flex-shrink: 0;
    }
    #opacity-icon {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      line-height: 1;
      cursor: default;
      user-select: none;
    }
    #opacity-slider {
      width: 66px;
      accent-color: #6b9fff;
      cursor: pointer;
    }

    /* ─── Loading indicator ────────────────────────────────────── */
    #loading-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, #6b9fff, #a78bfa);
      width: 0%;
      opacity: 0;
      z-index: 101;
      border-radius: 0 1px 1px 0;
      transition: opacity 0.2s;
    }
    #loading-bar.active {
      opacity: 1;
      animation: loadSlide 1.6s ease-in-out infinite;
    }
    @keyframes loadSlide {
      0%   { left: 0%;   width: 15%; }
      50%  { left: 42%;  width: 40%; }
      100% { left: 85%;  width: 15%; }
    }

    /* ─── Webview ──────────────────────────────────────────────── */
    webview {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
    }
  </style>
</head>
<body>
<div id="app">

  <div id="toolbar">
    <!-- Window controls -->
    <div class="wc">
      <button class="wc-btn" id="btn-close" title="Close">✕</button>
      <button class="wc-btn" id="btn-min"   title="Minimize">−</button>
      <button class="wc-btn" id="btn-max"   title="Maximise">+</button>
    </div>

    <div class="sep"></div>

    <!-- Navigation -->
    <button class="nav-btn" id="btn-back"    title="Back"    disabled>&#8592;</button>
    <button class="nav-btn" id="btn-fwd"     title="Forward" disabled>&#8594;</button>
    <button class="nav-btn" id="btn-reload"  title="Reload">&#8635;</button>

    <!-- URL bar -->
    <input type="text" id="url-bar"
           placeholder="Enter a URL or search…"
           autocomplete="off" spellcheck="false" />

    <div class="sep"></div>

    <!-- Always-on-top pin -->
    <button id="pin-btn" class="pinned" title="Toggle always-on-top">&#128204;</button>

    <div class="sep"></div>

    <!-- Opacity -->
    <div id="opacity-wrap">
      <span id="opacity-icon" title="Window opacity">&#9681;</span>
      <input type="range" id="opacity-slider" min="15" max="100" value="100"
             title="Opacity" />
    </div>

    <div id="loading-bar"></div>
  </div>

  <webview id="webview"
           src="https://www.google.com"
           allowpopups>
  </webview>

</div>
<script>
// ── Element refs ────────────────────────────────────────────────────────────
const toolbar       = document.getElementById('toolbar');
const webview       = document.getElementById('webview');
const urlBar        = document.getElementById('url-bar');
const pinBtn        = document.getElementById('pin-btn');
const opacitySlider = document.getElementById('opacity-slider');
const btnBack       = document.getElementById('btn-back');
const btnFwd        = document.getElementById('btn-fwd');
const btnReload     = document.getElementById('btn-reload');
const loadingBar    = document.getElementById('loading-bar');

// ── State ────────────────────────────────────────────────────────────────────
let alwaysOnTop    = true;
let isFocused      = true;   // OS-level window focus
let mouseInWin     = true;   // cursor is inside window bounds
let toolbarVisible = true;

// ── Toolbar visibility ───────────────────────────────────────────────────────
function applyToolbar(show) {
  if (show === toolbarVisible) return;
  toolbarVisible = show;
  toolbar.classList.toggle('hidden', !show);
}

function recalcToolbar() {
  applyToolbar(isFocused && mouseInWin);
}

window.electronAPI.onWindowFocus(focused => {
  isFocused = focused;
  recalcToolbar();
});

window.electronAPI.onMouseInWindow(inWin => {
  mouseInWin = inWin;
  recalcToolbar();
});

// ── Window controls ──────────────────────────────────────────────────────────
document.getElementById('btn-close').addEventListener('click', () => window.electronAPI.close());
document.getElementById('btn-min').addEventListener('click',   () => window.electronAPI.minimize());
document.getElementById('btn-max').addEventListener('click',   () => window.electronAPI.maximize());

// ── Navigation ───────────────────────────────────────────────────────────────
btnBack.addEventListener('click', () => webview.goBack());
btnFwd.addEventListener('click',  () => webview.goForward());
btnReload.addEventListener('click', () => {
  if (webview.isLoading()) webview.stop();
  else webview.reload();
});

function refreshNavButtons() {
  btnBack.disabled = !webview.canGoBack();
  btnFwd.disabled  = !webview.canGoForward();
}

// ── URL bar ──────────────────────────────────────────────────────────────────
urlBar.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const raw = urlBar.value.trim();
  if (!raw) return;
  webview.src = resolveUrl(raw);
  webview.focus();
});

// Select all text when user clicks into the URL bar
urlBar.addEventListener('focus', () => urlBar.select());

function resolveUrl(input) {
  if (/^https?:\/\//i.test(input)) return input;
  // Looks like a hostname (has a dot, no spaces)?
  if (/^[^\s]+\.[^\s]{2,}$/.test(input)) return 'https://' + input;
  // Fall back to Google search
  return 'https://www.google.com/search?q=' + encodeURIComponent(input);
}

// ── Webview events ───────────────────────────────────────────────────────────
webview.addEventListener('did-navigate', e => {
  urlBar.value = e.url;
  refreshNavButtons();
});

webview.addEventListener('did-navigate-in-page', e => {
  if (e.isMainFrame) {
    urlBar.value = e.url;
    refreshNavButtons();
  }
});

webview.addEventListener('did-start-loading', () => {
  loadingBar.classList.add('active');
  btnReload.innerHTML = '&#10005;';
  btnReload.title = 'Stop';
});

webview.addEventListener('did-stop-loading', () => {
  loadingBar.classList.remove('active');
  btnReload.innerHTML = '&#8635;';
  btnReload.title = 'Reload';
  refreshNavButtons();
});

// Redirect target="_blank" links into the same webview
webview.addEventListener('new-window', e => {
  e.preventDefault();
  webview.src = e.url;
});

// ── Always-on-top ────────────────────────────────────────────────────────────
pinBtn.addEventListener('click', async () => {
  alwaysOnTop = !alwaysOnTop;
  await window.electronAPI.toggleAlwaysOnTop(alwaysOnTop);
  pinBtn.classList.toggle('pinned', alwaysOnTop);
  pinBtn.title = alwaysOnTop
    ? 'Always on top: ON — click to disable'
    : 'Always on top: OFF — click to enable';
});

// ── Opacity ───────────────────────────────────────────────────────────────────
opacitySlider.addEventListener('input', () => {
  window.electronAPI.setOpacity(opacitySlider.value / 100);
});
</script>
</body>
</html>
